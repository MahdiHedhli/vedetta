[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

# --- Pi-hole DNS logs ---
[INPUT]
    Name         tail
    Path         /var/log/pihole/pihole.log
    Tag          dns.pihole
    Parser       pihole
    Refresh_Interval 10

# --- Firewall syslog (optional) ---
[INPUT]
    Name         syslog
    Tag          firewall.syslog
    Listen       0.0.0.0
    Port         5140
    Mode         udp
    Parser       syslog-rfc3164

# --- Transform Pi-hole logs into Vedetta Event schema ---
[FILTER]
    Name         lua
    Match        dns.pihole
    script       /fluent-bit/etc/pihole_transform.lua
    call         pihole_to_event

# --- Transform firewall syslog into Vedetta Event schema ---
[FILTER]
    Name         modify
    Match        firewall.syslog
    Add          event_type  firewall_log
    Rename       host        source_hash
    Rename       message     raw_log

# --- Forward to Vedetta Core ---
[OUTPUT]
    Name         http
    Match        *
    Host         backend
    Port         8080
    URI          /api/v1/ingest
    Format       json
    Json_date_key timestamp
    Json_date_format iso8601
