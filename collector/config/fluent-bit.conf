[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

# --- Pi-hole DNS logs ---
[INPUT]
    Name         tail
    Path         /var/log/pihole/pihole.log
    Tag          dns.pihole
    Parser       pihole
    Refresh_Interval 10

# --- Firewall syslog (optional) ---
[INPUT]
    Name         syslog
    Tag          firewall.syslog
    Listen       0.0.0.0
    Port         5140
    Mode         udp
    Parser       syslog-rfc3164

# --- Normalize and forward to backend ---
[OUTPUT]
    Name         http
    Match        *
    Host         backend
    Port         8080
    URI          /api/v1/ingest
    Format       json
    Json_date_key timestamp
    Json_date_format iso8601
