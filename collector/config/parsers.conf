[PARSER]
    Name         pihole
    Format       regex
    Regex        ^(?<timestamp>[^ ]+ [^ ]+) dnsmasq\[(?<pid>\d+)\]: (?<action>query|reply|forwarded|cached)\[(?<query_type>[A-Z]+)\] (?<domain>[^ ]+) from (?<client>[^ ]+)$
    Time_Key     timestamp
    Time_Format  %b %d %H:%M:%S

[PARSER]
    Name         syslog-rfc3164
    Format       regex
    Regex        ^<(?<pri>\d+)>(?<timestamp>[^ ]+ [^ ]+ [^ ]+) (?<host>[^ ]+) (?<ident>[^ :]+)(?:\[(?<pid>\d+)\])?: (?<message>.+)$
    Time_Key     timestamp
    Time_Format  %b %d %H:%M:%S
